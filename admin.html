<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración — CEFIMAT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/cefimat-modern.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { overflow-x: hidden; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(circle, rgba(99,102,241,0.05) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg,#eef1ff 0%,#f3f0ff 35%,#fdf0ff 65%,#fff3fb 100%);
            min-height: 100vh;
        }
        body.dark {
            background:
                radial-gradient(circle, rgba(99,102,241,0.09) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg,#06091b 0%,#0a0619 35%,#0e0618 65%,#08041a 100%);
        }
        .nav-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass {
            background: rgba(255,255,255,0.82); backdrop-filter: blur(14px);
            border: 1px solid rgba(99,102,241,0.12);
        }
        body.dark .glass { background: rgba(15,23,42,0.75); border-color: rgba(99,102,241,0.2); }

        .view.hidden { display: none !important; }

        /* Tabla */
        .tbl-row { transition: background .15s; }
        .tbl-row:hover { background: rgba(99,102,241,0.05); }
        body.dark .tbl-row:hover { background: rgba(99,102,241,0.08); }

        /* Modal */
        #detail-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            opacity: 0; pointer-events: none; transition: opacity .25s;
        }
        #detail-modal.open { opacity: 1; pointer-events: all; }
        #detail-box {
            transform: scale(.95) translateY(10px); transition: transform .25s;
            max-height: 86vh; overflow-y: auto;
        }
        #detail-modal.open #detail-box { transform: scale(1) translateY(0); }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ══════════════ NAV ══════════════ -->
<nav class="nav-blur fixed top-0 left-0 right-0 z-50 bg-white/85 dark:bg-slate-950/85
            border-b border-black/5 dark:border-white/10">
    <div class="px-4 sm:px-6 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 sm:gap-4">
            <img src="assets/Logo Cefimat Videos.png" alt="CEFIMAT" class="h-8 sm:h-12 w-auto object-contain">
            <div class="border-l border-black/10 dark:border-white/10 pl-2 sm:pl-4 h-8 sm:h-12 flex flex-col justify-center">
                <h1 class="text-sm sm:text-lg font-black text-slate-900 dark:text-white leading-none">CEFIMAT</h1>
                <p class="text-[8px] sm:text-[9px] text-indigo-500 uppercase tracking-widest font-bold">Administración</p>
            </div>
        </a>
        <div class="flex items-center gap-2">
            <span id="admin-badge" class="hidden items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold
                       bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300">
                <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
                <span id="admin-name">Admin</span>
            </span>
            <button id="btn-logout" onclick="adminLogout()"
                    class="hidden items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-semibold
                           text-slate-500 dark:text-slate-400 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Salir</span>
            </button>
            <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center
                   text-slate-500 dark:text-slate-400 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i data-lucide="sun" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
            </button>
        </div>
    </div>
</nav>

<!-- ══════════════ VIEW: LOGIN ══════════════ -->
<section id="view-login" class="view min-h-screen flex items-center justify-center px-4">
    <div class="glass rounded-3xl p-8 w-full max-w-sm shadow-2xl">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background:linear-gradient(135deg,#6366f1,#a855f7)">
            <i data-lucide="lock-keyhole" class="w-7 h-7 text-white"></i>
        </div>
        <h2 class="text-xl font-black text-slate-900 dark:text-white text-center mb-1">Panel de Administración</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6">Acceso restringido</p>

        <form id="admin-login-form" class="space-y-3">
            <div>
                <label class="text-xs font-bold text-slate-600 dark:text-slate-300 mb-1 block">Usuario</label>
                <input id="login-user" type="text" autocomplete="username" required
                       class="w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                              bg-white/70 dark:bg-slate-800/70 text-sm text-slate-800 dark:text-white
                              focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       placeholder="">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-600 dark:text-slate-300 mb-1 block">Contraseña</label>
                <input id="login-pass" type="password" autocomplete="current-password" required
                       class="w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                              bg-white/70 dark:bg-slate-800/70 text-sm text-slate-800 dark:text-white
                              focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       placeholder="••••••••">
            </div>
            <p id="login-error" class="hidden text-xs font-semibold text-red-500 text-center"></p>
            <button id="login-btn" type="submit"
                    class="w-full py-2.5 rounded-xl font-bold text-sm text-white hover:opacity-90 transition-opacity"
                    style="background:linear-gradient(135deg,#6366f1,#a855f7)">
                Entrar
            </button>
        </form>
        <a href="index.html" class="block text-center text-xs text-slate-400 hover:text-indigo-500 mt-5 transition-colors">
            ← Volver al inicio
        </a>
    </div>
</section>

<!-- ══════════════ VIEW: DASHBOARD ══════════════ -->
<section id="view-dashboard" class="view hidden pt-24 pb-16 px-4 max-w-7xl mx-auto">

    <div class="mb-8">
        <h1 class="text-2xl sm:text-3xl font-black text-slate-900 dark:text-white mb-1">Monitoreo de alumnos</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
            Estadísticas en tiempo real y control de acceso a los simuladores.
        </p>
    </div>

    <!-- KPI cards -->
    <div id="stats-cards" class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
        <!-- populated by JS -->
    </div>

    <!-- Controles -->
    <div class="glass rounded-2xl p-4 mb-4 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
        <div class="flex items-center gap-2 flex-1">
            <i data-lucide="search" class="w-4 h-4 text-slate-400 flex-shrink-0"></i>
            <input id="search-input" type="text" oninput="filterStudents()"
                   placeholder="Buscar por nombre, correo o clave…"
                   class="flex-1 bg-transparent text-sm text-slate-800 dark:text-white
                          focus:outline-none placeholder:text-slate-400">
        </div>
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 whitespace-nowrap">
                Acceso al examen:
            </label>
            <select id="exam-select" onchange="onExamChange()"
                    class="px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700
                           bg-white/70 dark:bg-slate-800/70 text-sm font-semibold
                           text-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </select>
            <button onclick="refreshDashboard()" title="Refrescar"
                    class="w-8 h-8 rounded-xl flex items-center justify-center
                           text-slate-500 dark:text-slate-400 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Tabla de alumnos -->
    <div class="glass rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-left text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500
                               border-b border-black/5 dark:border-white/10">
                        <th class="px-4 py-3 font-bold">Alumno</th>
                        <th class="px-3 py-3 font-bold text-center">Intentos</th>
                        <th class="px-3 py-3 font-bold text-center">Completados</th>
                        <th class="px-3 py-3 font-bold text-center">Mejor</th>
                        <th class="px-3 py-3 font-bold text-center">Materias</th>
                        <th class="px-3 py-3 font-bold">Última actividad</th>
                        <th class="px-3 py-3 font-bold text-center">Acceso</th>
                        <th class="px-3 py-3 font-bold text-center"></th>
                    </tr>
                </thead>
                <tbody id="students-tbody">
                    <tr><td colspan="8" class="px-4 py-12 text-center text-slate-400">
                        <i data-lucide="loader-2" class="w-6 h-6 mx-auto mb-2 spin"></i>
                        Cargando alumnos…
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <p id="table-count" class="text-xs text-slate-400 dark:text-slate-500 mt-3 px-1"></p>
</section>

<!-- ══════════════ MODAL: DETALLE ALUMNO ══════════════ -->
<div id="detail-modal" onclick="if(event.target===this) closeDetail()">
    <div id="detail-box" class="glass rounded-3xl p-6 w-full max-w-2xl shadow-2xl">
        <div class="flex items-start justify-between mb-4">
            <div>
                <h3 id="detail-name" class="text-lg font-black text-slate-900 dark:text-white"></h3>
                <p id="detail-email" class="text-xs text-slate-500 dark:text-slate-400"></p>
            </div>
            <button onclick="closeDetail()"
                    class="w-8 h-8 rounded-xl flex items-center justify-center
                           text-slate-400 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div id="detail-body"><!-- populated by JS --></div>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
    (function () { if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark'); })();
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
</script>
</body>
</html>
