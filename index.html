<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEFIMAT Asesor\u00EDas - Plataforma de Cuestionarios</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/cefimat-modern.css">
    <script src="js/api.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow-x: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(circle, rgba(99, 102, 241, 0.05) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg, #eef1ff 0%, #f3f0ff 35%, #fdf0ff 65%, #fff3fb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        body.dark {
            background:
                radial-gradient(circle, rgba(99, 102, 241, 0.09) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg, #06091b 0%, #0a0619 35%, #0e0618 65%, #08041a 100%);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Optimizaci\u00F3n m\u00F3vil: desactivar animaciones costosas */
        @media (min-width: 768px) {
            .fade-in {
                animation: fadeIn 0.6s ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .subject-card {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                overflow: hidden;
            }

            .subject-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
                opacity: 0;
                transition: opacity 0.4s;
            }

            .subject-card:not(.locked):hover::before {
                opacity: 1;
            }

            .subject-card:not(.locked):hover {
                transform: translateY(-12px) scale(1.03);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
            }

            .subject-card .icon-wrapper {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .subject-card:not(.locked):hover .icon-wrapper {
                transform: scale(1.1) rotate(5deg);
            }

            .hero-badge {
                animation: float 3s ease-in-out infinite;
            }

            @keyframes float {

                0%,
                100% {
                    transform: translateY(0px);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            .social-link {
                transition: all 0.3s;
            }

            .social-link:hover {
                transform: translateY(-3px);
            }

            .theme-toggle:hover {
                transform: rotate(180deg);
            }

            /* Animaci\u00F3n de entrada para las cards */
            .card-1 {
                animation-delay: 0.1s;
            }

            .card-2 {
                animation-delay: 0.2s;
            }

            .card-3 {
                animation-delay: 0.3s;
            }

            .card-4 {
                animation-delay: 0.4s;
            }

            .card-5 {
                animation-delay: 0.5s;
            }

            .card-6 {
                animation-delay: 0.6s;
            }
        }

        /* M\u00F3vil: sin animaciones */
        @media (max-width: 767px) {

            .fade-in,
            .hero-badge,
            .subject-card,
            .social-link {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }

            .subject-card::before {
                display: none;
            }

            .glass-light,
            .glass-dark {
                backdrop-filter: blur(10px);
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .theme-toggle {
            transition: transform 0.3s;
        }

        .user-dropdown {
            position: relative;
        }

        .user-dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            min-width: 250px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .user-dropdown.active .user-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            text-transform: uppercase;
        }

        /* Mobile menu styles */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            transition: right 0.3s ease-in-out;
            z-index: 200;
            overflow-y: auto;
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 199;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @media (min-width: 768px) {
            .mobile-menu-button {
                display: none;
            }
        }

        /* Trophy Button Animation */
        .trophy-button {
            position: relative;
            overflow: hidden;
            animation: trophy-pulse 2s ease-in-out infinite;
        }

        @keyframes trophy-pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px 10px rgba(251, 191, 36, 0);
            }
        }

        .trophy-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            animation: trophy-shine 3s linear infinite;
        }

        @keyframes trophy-shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .trophy-icon {
            animation: trophy-bounce 1s ease-in-out infinite;
        }

        @keyframes trophy-bounce {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-3px) rotate(-5deg);
            }

            75% {
                transform: translateY(-3px) rotate(5deg);
            }
        }

        /* Mobile: disable trophy animations */
        @media (max-width: 767px) {

            .trophy-button,
            .trophy-icon {
                animation: none !important;
            }

            .trophy-button::before {
                display: none;
            }
        }

        /* Premium Highscores Button */
        .premium-highscores-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            border: 2px solid #fbbf24;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            position: relative;
            overflow: hidden;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            }

            50% {
                box-shadow: 0 4px 30px rgba(251, 191, 36, 0.8), 0 0 50px rgba(251, 191, 36, 0.4);
            }
        }

        .premium-highscores-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shine-sweep 3s linear infinite;
        }

        @keyframes shine-sweep {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .premium-highscores-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.6), 0 0 60px rgba(251, 191, 36, 0.5);
        }

        .premium-highscores-btn .trophy-icon {
            animation: trophy-bounce 1s ease-in-out infinite;
        }

        /* Mobile: disable premium button animations */
        @media (max-width: 767px) {
            .premium-highscores-btn {
                animation: none !important;
            }

            .premium-highscores-btn::before {
                display: none;
            }
        }
    </style>
</head>

<body id="body">
    <!-- Navigation -->
    <nav id="nav" class="nav-blur sticky top-0 z-50"></nav>

    <!-- Main Content -->
    <main id="main" class="container mx-auto px-4 py-6 md:py-12 max-w-7xl">
        <!-- Hero Section -->
        <section id="hero" class="text-center space-y-6 mb-10 fade-in"></section>

        <!-- KPI Stats -->
        <section id="stats" class="max-w-6xl mx-auto mb-10 fade-in"></section>

        <!-- Subject Cards -->
        <section id="subjects" class="max-w-6xl mx-auto mb-16"></section>

        <!-- Coming Soon -->
        <section id="comingSoon" class="max-w-4xl mx-auto mb-16 fade-in"></section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="mt-20"></footer>

    <script>
        // Check authentication on page load
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        if (!isLoggedIn) {
            window.location.href = 'auth.html';
        }

        // Get user data
        const userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // State
        const state = {
            darkMode: localStorage.getItem('darkMode') !== 'false',
            userName: userData.name || '',
            userGroup: userData.group || '',
            mobileMenuOpen: false,
            leaderboards: {
                biologia: {},
                fisica: {},
                foce: {},
                geografia: {},
                historia_mexico: {},
                historia_universal: {},
                quimica: {}
            },
            showLeaderboard: false,
            userProgress: {},
            countdownInterval: null
        };

        function getCountdown() {
            const target = new Date('2026-06-28T00:00:00');
            const diff = Math.max(0, target - new Date());
            return {
                days: Math.floor(diff / 86400000),
                hours: Math.floor((diff % 86400000) / 3600000),
                minutes: Math.floor((diff % 3600000) / 60000),
                seconds: Math.floor((diff % 60000) / 1000),
                passed: diff === 0
            };
        }

        // Fetch progress for the current user
        async function fetchUserProgress() {
            try {
                const result = await getUserScores();
                if (!result.success || !result.scores) return;

                // For each subject, keep the best score per unique quiz (unit_key + quiz_key)
                const bestPerQuiz = {};
                for (const s of result.scores) {
                    const key = `${s.subject}__${s.unit_key}__${s.quiz_key}`;
                    if (!bestPerQuiz[key] || s.percentage > bestPerQuiz[key].percentage) {
                        bestPerQuiz[key] = s;
                    }
                }

                // Group summaries by subject
                const summary = {};
                for (const s of Object.values(bestPerQuiz)) {
                    if (!summary[s.subject]) {
                        summary[s.subject] = { completed: 0, totalPct: 0 };
                    }
                    summary[s.subject].completed++;
                    summary[s.subject].totalPct += s.percentage;
                }

                const progress = {};
                for (const [subject, data] of Object.entries(summary)) {
                    progress[subject] = {
                        completed: data.completed,
                        avg: Math.round(data.totalPct / data.completed)
                    };
                }

                state.userProgress = progress;
                render();
            } catch (err) {
                console.error('Error fetching user progress:', err);
            }
        }

        // Fetch leaderboards
        async function fetchLeaderboards() {
            const subjects = [
                { key: 'biologia', name: 'Biología', units: 5 },
                { key: 'fisica', name: 'Física', units: 4 },
                { key: 'foce', name: 'FOCE', units: 9 },
                { key: 'geografia', name: 'Geografía', units: 2 },
                { key: 'historia_mexico', name: 'Hist. México', units: 5 },
                { key: 'historia_universal', name: 'Hist. Universal', units: 5 },
                { key: 'quimica', name: 'Química', units: 3 },
            ];

            for (const subject of subjects) {
                try {
                    const unitLeaderboards = {};

                    // Fetch scores for each unit
                    for (let unitNum = 1; unitNum <= subject.units; unitNum++) {
                        const unitKey = `u${unitNum}`;

                        const { data, error } = await supabaseClient
                            .from('high_scores')
                            .select(`
                                score,
                                total_questions,
                                percentage,
                                quiz_key,
                                completed_at,
                                usuarios (
                                    nombre
                                )
                            `)
                            .eq('subject', subject.key)
                            .eq('unit_key', unitKey)
                            .order('score', { ascending: false })
                            .order('completed_at', { ascending: true })
                            .limit(3);

                        if (!error && data && data.length > 0) {
                            unitLeaderboards[unitKey] = data;
                        }
                    }

                    state.leaderboards[subject.key] = unitLeaderboards;
                } catch (err) {
                    console.error(`Error fetching leaderboard for ${subject.key}:`, err);
                }
            }
            render();
        }

        function toggleLeaderboard() {
            state.showLeaderboard = !state.showLeaderboard;
            render();
        }

        function isUnlocked() {
            return isLoggedIn && state.userName.trim().length > 0 && state.userGroup.trim().length > 0;
        }

        function logout() {
            api.logout();
        }

        function toggleUserDropdown(event) {
            event.stopPropagation();
            const dropdown = document.querySelector('.user-dropdown');
            dropdown.classList.toggle('active');
        }

        // Toggle mobile menu
        function toggleMobileMenu() {
            state.mobileMenuOpen = !state.mobileMenuOpen;
            const menu = document.querySelector('.mobile-menu');
            const overlay = document.querySelector('.menu-overlay');

            if (state.mobileMenuOpen) {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const dropdown = document.querySelector('.user-dropdown');
            if (dropdown && dropdown.classList.contains('active')) {
                dropdown.classList.remove('active');
            }

            // Close leaderboard if clicking outside
            if (state.showLeaderboard && !event.target.closest('.relative')) {
                state.showLeaderboard = false;
                render();
            }
        });

        // Toggle dark mode
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('darkMode', state.darkMode);
            applyTheme();
        }

        function applyTheme() {
            const body = document.getElementById('body');
            if (state.darkMode) {
                body.classList.add('dark');
            } else {
                body.classList.remove('dark');
            }
            render();
        }

        function render() {
            const isDark = state.darkMode;

            const glassClass = isDark ? 'glass-dark' : 'glass-light';
            const textPrimary = isDark ? 'text-white' : 'text-slate-900';
            const textSecondary = isDark ? 'text-slate-400' : 'text-slate-600';
            const textMuted = isDark ? 'text-slate-500' : 'text-slate-400';
            const borderColor = isDark ? 'border-white/10' : 'border-black/10';

            // Navigation
            document.getElementById('nav').innerHTML = `
                <div class="${glassClass} shadow-lg">
                    <div class="container mx-auto px-3 sm:px-6 py-3 sm:py-4 max-w-7xl">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 sm:gap-4">
                                <img src="assets/Logo Cefimat Videos.png" alt="CEFIMAT Logo" class="h-8 sm:h-12 w-auto object-contain">
                                <div class="border-l ${borderColor} pl-2 sm:pl-4 h-8 sm:h-12 flex flex-col justify-center">
                                    <h1 class="text-sm sm:text-lg font-black ${textPrimary}">CEFIMAT</h1>
                                    <p class="text-[8px] sm:text-[9px] ${textMuted} uppercase tracking-widest">Asesor\u00EDas</p>
                                </div>
                            </div>
                            
                            <!-- Desktop menu -->
                            <div class="hidden md:flex items-center gap-3">
                                <!-- High Scores Button -->
                                <div class="relative">
                                    <button onclick="toggleLeaderboard()" class="${glassClass} px-4 py-2 rounded-xl flex items-center gap-2 hover:ring-2 hover:ring-indigo-500/50 transition-all shadow-md">
                                        <i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i>
                                        <span class="text-sm font-bold ${textPrimary}">High Scores</span>
                                    </button>
                                    
                                    ${state.showLeaderboard ? `
                                    <div class="${glassClass} absolute top-full right-0 mt-2 w-[500px] rounded-2xl shadow-2xl overflow-hidden z-50">
                                        <div class="p-4 border-b ${borderColor} bg-gradient-to-r from-amber-500/10 to-orange-500/10">
                                            <div class="flex items-center gap-2">
                                                <i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i>
                                                <h3 class="text-lg font-black ${textPrimary}">Top 3 por Unidad</h3>
                                            </div>
                                        </div>
                                        
                                        <div class="max-h-[500px] overflow-y-auto p-4 space-y-4">
                                            ${['biologia', 'fisica', 'foce', 'geografia', 'historia', 'quimica'].map((subject) => {
                const names = {
                    'biologia': 'Biología',
                    'fisica': 'Física',
                    'foce': 'FOCE',
                    'geografia': 'Geografía',
                    'historia': 'Historia',
                    'quimica': 'Química'
                };
                const colors = {
                    'biologia': 'green',
                    'fisica': 'rose',
                    'foce': 'sky',
                    'geografia': 'amber',
                    'historia': 'violet',
                    'quimica': 'fuchsia'
                };
                const icons = {
                    'biologia': 'microscope',
                    'fisica': 'atom',
                    'foce': 'scale',
                    'geografia': 'map',
                    'historia': 'book-open',
                    'quimica': 'flask-conical'
                };
                const unitLeaderboards = state.leaderboards[subject] || {};
                const hasAnyScores = Object.keys(unitLeaderboards).length > 0;

                return `
                                                <div class="${glassClass} rounded-xl p-3">
                                                    <h4 class="text-sm font-bold text-${colors[subject]}-600 mb-3 flex items-center gap-2">
                                                        <i data-lucide="${icons[subject]}" class="w-4 h-4"></i>
                                                        ${names[subject]}
                                                    </h4>
                                                    ${hasAnyScores ? `
                                                        <div class="space-y-3">
                                                            ${Object.keys(unitLeaderboards).sort((a, b) => {
                    const numA = parseInt(a.replace('u', ''));
                    const numB = parseInt(b.replace('u', ''));
                    return numA - numB;
                }).map(unitKey => {
                    const unitNum = unitKey.replace('u', '');
                    const scores = unitLeaderboards[unitKey] || [];

                    return `
                                                                    <div class="border-l-2 border-${colors[subject]}-500/30 pl-2">
                                                                        <p class="text-[10px] font-bold ${textMuted} uppercase tracking-wider mb-1">Unidad ${unitNum}</p>
                                                                        <div class="space-y-1">
                                                                            ${scores.slice(0, 3).map((entry, index) => `
                                                                                <div class="flex items-center justify-between text-xs py-1">
                                                                                    <div class="flex items-center gap-2">
                                                                                        <span class="w-5 h-5 rounded-full ${index === 0 ? 'bg-amber-500 text-white' : index === 1 ? 'bg-slate-400 text-white' : 'bg-orange-600 text-white'} flex items-center justify-center text-[10px] font-bold">
                                                                                            ${index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉'}
                                                                                        </span>
                                                                                        <span class="${textPrimary} ${index === 0 ? 'font-bold' : ''}">${entry.usuarios?.nombre || 'Usuario'}</span>
                                                                                    </div>
                                                                                    <span class="text-${colors[subject]}-600 font-bold">${entry.score}/${entry.total_questions}</span>
                                                                                </div>
                                                                            `).join('')}
                                                                        </div>
                                                                    </div>
                                                                `;
                }).join('')}
                                                        </div>
                                                    ` : `
                                                        <p class="text-xs ${textMuted} italic">No hay puntuaciones aún</p>
                                                    `}
                                                </div>
                                                `;
            }).join('')}
                                        </div>
                                    </div>
                                    ` : ''}
                                </div>

                                <!-- BOTÓN PREMIUM HIGHSCORES -->
                                <a href="highscores.html" class="premium-highscores-btn px-5 py-2.5 rounded-xl flex items-center gap-2 transition-all shadow-lg text-white font-bold text-sm no-underline">
                                    <span class="trophy-icon text-lg">🏆</span>
                                    <span>Ver Hall of Fame</span>
                                </a>
                                
                                <button onclick="toggleDarkMode()" class="theme-toggle w-11 h-11 rounded-xl ${glassClass} flex items-center justify-center ${textSecondary} hover:text-indigo-500 transition-all shadow-md">
                                    <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5"></i>
                                </button>
                                <div class="user-dropdown">
                                    <button onclick="toggleUserDropdown(event)" class="${glassClass} px-4 py-2 rounded-xl flex items-center gap-3 hover:ring-2 hover:ring-indigo-500/50 transition-all shadow-md">
                                        <div class="user-avatar" style="width: 40px; height: 40px; font-size: 16px; border-radius: 12px;">${state.userName.charAt(0)}</div>
                                        <div class="text-left">
                                            <p class="text-sm font-bold ${textPrimary} leading-tight">${state.userName}</p>
                                            <p class="text-xs ${textMuted}">Grupo ${state.userGroup}</p>
                                        </div>
                                        <i data-lucide="chevron-down" class="w-4 h-4 ${textMuted}"></i>
                                    </button>
                                    <div class="user-dropdown-menu ${glassClass} rounded-2xl shadow-2xl overflow-hidden">
                                        <div class="p-4 border-b ${borderColor}">
                                            <p class="text-sm font-bold ${textPrimary}">${state.userName}</p>
