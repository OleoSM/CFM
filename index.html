<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEFIMAT Asesor\u00EDas - Plataforma de Cuestionarios</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/cefimat-modern.css">
    <script src="js/api.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow-x: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #08041a;
        }

        /* Page content sits above the nebula */
        #page-content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            transition: background 0.3s;
            background:
                radial-gradient(circle, rgba(99, 102, 241, 0.05) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg, rgba(238,241,255,0.72) 0%, rgba(243,240,255,0.72) 35%, rgba(253,240,255,0.72) 65%, rgba(255,243,251,0.72) 100%);
        }

        body.dark #page-content {
            background:
                radial-gradient(circle, rgba(99, 102, 241, 0.09) 1px, transparent 1px) 0 0 / 28px 28px,
                linear-gradient(155deg, rgba(6,9,27,0.38) 0%, rgba(10,6,25,0.38) 35%, rgba(14,6,24,0.38) 65%, rgba(8,4,26,0.38) 100%);
        }

        /* Nebula shader — fixed, behind everything */
        #nebula-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        #nebula-bg canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Optimizaci\u00F3n m\u00F3vil: desactivar animaciones costosas */
        @media (min-width: 768px) {
            .fade-in {
                animation: fadeIn 0.6s ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .subject-card {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
                overflow: hidden;
            }

            .subject-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
                opacity: 0;
                transition: opacity 0.4s;
            }

            .subject-card:not(.locked):hover::before {
                opacity: 1;
            }

            .subject-card:not(.locked):hover {
                transform: translateY(-12px) scale(1.03);
                box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
            }

            .subject-card .icon-wrapper {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .subject-card:not(.locked):hover .icon-wrapper {
                transform: scale(1.1) rotate(5deg);
            }

            .hero-badge {
                animation: float 3s ease-in-out infinite;
            }

            @keyframes float {

                0%,
                100% {
                    transform: translateY(0px);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            .social-link {
                transition: all 0.3s;
            }

            .social-link:hover {
                transform: translateY(-3px);
            }

            .theme-toggle:hover {
                transform: rotate(180deg);
            }

            /* Animaci\u00F3n de entrada para las cards */
            .card-1 {
                animation-delay: 0.1s;
            }

            .card-2 {
                animation-delay: 0.2s;
            }

            .card-3 {
                animation-delay: 0.3s;
            }

            .card-4 {
                animation-delay: 0.4s;
            }

            .card-5 {
                animation-delay: 0.5s;
            }

            .card-6 {
                animation-delay: 0.6s;
            }

            .card-7 {
                animation-delay: 0.7s;
            }

            .card-8 {
                animation-delay: 0.8s;
            }
        }

        /* M\u00F3vil: sin animaciones */
        @media (max-width: 767px) {

            .fade-in,
            .hero-badge,
            .subject-card,
            .social-link {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }

            .subject-card::before {
                display: none;
            }

            .glass-light,
            .glass-dark {
                backdrop-filter: blur(10px);
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .theme-toggle {
            transition: transform 0.3s;
        }

        .user-dropdown {
            position: relative;
        }

        .user-dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            min-width: 250px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .user-dropdown.active .user-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            text-transform: uppercase;
        }

        /* Mobile menu styles */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            transition: right 0.3s ease-in-out;
            z-index: 200;
            overflow-y: auto;
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 199;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @media (min-width: 768px) {
            .mobile-menu-button {
                display: none;
            }
        }

        /* Trophy Button Animation */
        .trophy-button {
            position: relative;
            overflow: hidden;
            animation: trophy-pulse 2s ease-in-out infinite;
        }

        @keyframes trophy-pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px 10px rgba(251, 191, 36, 0);
            }
        }

        .trophy-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent,
                    rgba(255, 255, 255, 0.3),
                    transparent);
            animation: trophy-shine 3s linear infinite;
        }

        @keyframes trophy-shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .trophy-icon {
            animation: trophy-bounce 1s ease-in-out infinite;
        }

        @keyframes trophy-bounce {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-3px) rotate(-5deg);
            }

            75% {
                transform: translateY(-3px) rotate(5deg);
            }
        }

        /* Mobile: disable trophy animations */
        @media (max-width: 767px) {

            .trophy-button,
            .trophy-icon {
                animation: none !important;
            }

            .trophy-button::before {
                display: none;
            }
        }

        /* Liquid Button */
        .liquid-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.45rem 1rem;
            border-radius: 10px;
            background: #000822;
            border: 1.5px solid rgba(255,255,255,0.12);
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            overflow: hidden;
            isolation: isolate;
            box-shadow: 0 0 18px rgba(99,102,241,0.35);
            text-decoration: none;
            cursor: pointer;
            transition: box-shadow 0.3s, transform 0.2s;
        }
        .liquid-btn:hover {
            box-shadow: 0 0 28px rgba(99,102,241,0.6);
            transform: scale(1.04);
            color: white;
            text-decoration: none;
        }
        .liquid-btn-inner {
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg,
                #1E10C5 0%, #4743EF 18%, #9089E2 30%,
                #FCFCFE 38%, #7D7BF4 48%, #0E2DCB 60%,
                #0B06FC 75%, #9089E2 88%, #1E10C5 100%);
            background-size: 300% 100%;
            animation: liquid-flow 4s ease-in-out infinite;
            mix-blend-mode: screen;
            opacity: 0.75;
        }
        .liquid-btn-inner2 {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(79,67,239,0.6) 0%, transparent 60%);
            mix-blend-mode: overlay;
            animation: liquid-pulse 3s ease-in-out infinite alternate;
        }
        .liquid-btn-label {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @keyframes liquid-flow {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }
        @keyframes liquid-pulse {
            from { opacity: 0.4; }
            to   { opacity: 0.8; }
        }

        /* KEPT: trophy-bounce used by legacy pages */
        .premium-highscores-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            border: 2px solid #fbbf24;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            position: relative;
            overflow: hidden;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            }

            50% {
                box-shadow: 0 4px 30px rgba(251, 191, 36, 0.8), 0 0 50px rgba(251, 191, 36, 0.4);
            }
        }

        .premium-highscores-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shine-sweep 3s linear infinite;
        }

        @keyframes shine-sweep {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .premium-highscores-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.6), 0 0 60px rgba(251, 191, 36, 0.5);
        }

        .premium-highscores-btn .trophy-icon {
            animation: trophy-bounce 1s ease-in-out infinite;
        }

        /* Mobile: disable premium button animations */
        @media (max-width: 767px) {
            .premium-highscores-btn {
                animation: none !important;
            }

            .premium-highscores-btn::before {
                display: none;
            }
        }

    </style>
</head>

<body id="body">
    <!-- Nebula shader background (behind everything) -->
    <div id="nebula-bg"></div>

    <!-- Page content (above nebula) -->
    <div id="page-content">
        <!-- Navigation -->
        <nav id="nav" class="nav-blur sticky top-0 z-50"></nav>

        <!-- Main Content -->
        <main id="main" class="container mx-auto px-4 py-6 md:py-12 max-w-7xl">
            <!-- Hero Section -->
            <section id="hero" class="text-center space-y-6 mb-10 fade-in"></section>

            <!-- KPI Stats -->
            <section id="stats" class="max-w-6xl mx-auto mb-10 fade-in"></section>

            <!-- Subject Cards -->
            <section id="subjects" class="max-w-6xl mx-auto mb-16"></section>

            <!-- Coming Soon -->
            <section id="comingSoon" class="max-w-4xl mx-auto mb-16 fade-in"></section>
        </main>

        <!-- Footer -->
        <footer id="footer" class="mt-20"></footer>
    </div>

    <script>
        // Check authentication on page load
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        if (!isLoggedIn) {
            window.location.href = 'auth.html';
        }

        // Get user data
        const userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // Exam mode toggle
        function toggleExamMode() {
            const isOn = localStorage.getItem('cefimat_exam_mode') === '1';
            localStorage.setItem('cefimat_exam_mode', isOn ? '0' : '1');
            render();
        }

        // State
        const state = {
            darkMode: localStorage.getItem('darkMode') !== 'false',
            userName: userData.name || '',
            userGroup: userData.group || '',
            mobileMenuOpen: false,
            userProgress: {},
            countdownInterval: null
        };

        function getCountdown() {
            const target = new Date('2026-06-28T00:00:00');
            const diff = Math.max(0, target - new Date());
            return {
                days: Math.floor(diff / 86400000),
                hours: Math.floor((diff % 86400000) / 3600000),
                minutes: Math.floor((diff % 3600000) / 60000),
                seconds: Math.floor((diff % 60000) / 1000),
                passed: diff === 0
            };
        }

        // Fetch progress for the current user
        async function fetchUserProgress() {
            try {
                const result = await getUserScores();
                if (!result.success || !result.scores) return;

                // For each subject, keep the best score per unique quiz (unit_key + quiz_key)
                const bestPerQuiz = {};
                for (const s of result.scores) {
                    const key = `${s.subject}__${s.unit_key}__${s.quiz_key}`;
                    if (!bestPerQuiz[key] || s.percentage > bestPerQuiz[key].percentage) {
                        bestPerQuiz[key] = s;
                    }
                }

                // Group summaries by subject
                const summary = {};
                for (const s of Object.values(bestPerQuiz)) {
                    if (!summary[s.subject]) {
                        summary[s.subject] = { completed: 0, totalPct: 0 };
                    }
                    summary[s.subject].completed++;
                    summary[s.subject].totalPct += s.percentage;
                }

                const progress = {};
                for (const [subject, data] of Object.entries(summary)) {
                    progress[subject] = {
                        completed: data.completed,
                        avg: Math.round(data.totalPct / data.completed)
                    };
                }

                state.userProgress = progress;
                render();
            } catch (err) {
                console.error('Error fetching user progress:', err);
            }
        }

        function isUnlocked() {
            return isLoggedIn && state.userName.trim().length > 0 && state.userGroup.trim().length > 0;
        }

        function logout() {
            api.logout();
        }

        function toggleUserDropdown(event) {
            event.stopPropagation();
            const dropdown = document.querySelector('.user-dropdown');
            dropdown.classList.toggle('active');
        }

        // Toggle mobile menu
        function toggleMobileMenu() {
            state.mobileMenuOpen = !state.mobileMenuOpen;
            const menu = document.querySelector('.mobile-menu');
            const overlay = document.querySelector('.menu-overlay');

            if (state.mobileMenuOpen) {
                menu.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                menu.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const dropdown = document.querySelector('.user-dropdown');
            if (dropdown && dropdown.classList.contains('active')) {
                dropdown.classList.remove('active');
            }

        });

        // Toggle dark mode
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('darkMode', state.darkMode);
            applyTheme();
        }

        function applyTheme() {
            const body = document.getElementById('body');
            if (state.darkMode) {
                body.classList.add('dark');
            } else {
                body.classList.remove('dark');
            }
            render();
        }

        function render() {
            const isDark = state.darkMode;

            const glassClass = isDark ? 'glass-dark' : 'glass-light';
            const textPrimary = isDark ? 'text-white' : 'text-slate-900';
            const textSecondary = isDark ? 'text-slate-400' : 'text-slate-600';
            const textMuted = isDark ? 'text-slate-500' : 'text-slate-400';
            const borderColor = isDark ? 'border-white/10' : 'border-black/10';

            // Navigation
            document.getElementById('nav').innerHTML = `
                <div class="${glassClass} shadow-lg">
                    <div class="container mx-auto px-3 sm:px-6 py-3 sm:py-4 max-w-7xl">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 sm:gap-4">
                                <img src="assets/Logo Cefimat Videos.png" alt="CEFIMAT Logo" class="h-8 sm:h-12 w-auto object-contain">
                                <div class="border-l ${borderColor} pl-2 sm:pl-4 h-8 sm:h-12 flex flex-col justify-center">
                                    <h1 class="text-sm sm:text-lg font-black ${textPrimary}">CEFIMAT</h1>
                                    <p class="text-[8px] sm:text-[9px] ${textMuted} uppercase tracking-widest">Asesor\u00EDas</p>
                                </div>
                            </div>
                            
                            <!-- Desktop menu -->
                            <div class="hidden md:flex items-center gap-3">
                                <!-- Hall of Fame liquid button -->
                                <a href="highscores.html" class="liquid-btn">
                                    <div class="liquid-btn-inner"></div>
                                    <div class="liquid-btn-inner2"></div>
                                    <span class="liquid-btn-label">
                                        <i data-lucide="trophy" class="w-4 h-4"></i>
                                        <span class="hidden lg:inline">Hall of Fame</span>
                                    </span>
                                </a>

                                <!-- Examen liquid button -->
                                <a href="examen.html" class="liquid-btn">
                                    <div class="liquid-btn-inner"></div>
                                    <div class="liquid-btn-inner2"></div>
                                    <span class="liquid-btn-label">
                                        <i data-lucide="shield" class="w-4 h-4"></i>
                                        <span class="hidden lg:inline">Examen</span>
                                    </span>
                                </a>
                                <button onclick="toggleDarkMode()" class="theme-toggle w-11 h-11 rounded-xl ${glassClass} flex items-center justify-center ${textSecondary} hover:text-indigo-500 transition-all shadow-md">
                                    <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5"></i>
                                </button>
                                <div class="user-dropdown">
                                    <button onclick="toggleUserDropdown(event)" class="${glassClass} px-4 py-2 rounded-xl flex items-center gap-3 hover:ring-2 hover:ring-indigo-500/50 transition-all shadow-md">
                                        <div class="user-avatar" style="width: 40px; height: 40px; font-size: 16px; border-radius: 12px;">${state.userName.charAt(0)}</div>
                                        <div class="text-left">
                                            <p class="text-sm font-bold ${textPrimary} leading-tight">${state.userName}</p>
                                            <p class="text-xs ${textMuted}">Grupo ${state.userGroup}</p>
                                        </div>
                                        <i data-lucide="chevron-down" class="w-4 h-4 ${textMuted}"></i>
                                    </button>
                                    <div class="user-dropdown-menu ${glassClass} rounded-2xl shadow-2xl overflow-hidden">
                                        <div class="p-4 border-b ${borderColor}">
                                            <p class="text-sm font-bold ${textPrimary}">${state.userName}</p>
                                            <p class="text-xs ${textMuted}">${userData.email || ''}</p>
                                            <div class="mt-2 inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-indigo-500/10 text-indigo-500 text-xs font-bold">
                                                <i data-lucide="users" class="w-3 h-3"></i>
                                                Grupo ${state.userGroup}
                                            </div>
                                        </div>
                                        <button onclick="logout()" class="w-full px-4 py-3 text-left flex items-center gap-3 ${textSecondary} hover:bg-red-500/10 hover:text-red-500 transition-colors">
                                            <i data-lucide="log-out" class="w-4 h-4"></i>
                                            <span class="text-sm font-medium">Cerrar sesi\u00F3n</span>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Mobile hamburger button -->
                            <button onclick="toggleMobileMenu()" class="md:hidden mobile-menu-button w-10 h-10 rounded-xl ${glassClass} flex items-center justify-center ${textSecondary} shadow-md">
                                <i data-lucide="menu" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mobile menu overlay -->
                <div class="menu-overlay" onclick="toggleMobileMenu()"></div>

                <!-- Mobile menu -->
                <div class="mobile-menu ${glassClass} shadow-2xl">
                    <div class="p-6 border-b ${borderColor}">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold ${textPrimary}">Men\u00FA</h3>
                            <button onclick="toggleMobileMenu()" class="w-10 h-10 rounded-xl ${glassClass} flex items-center justify-center ${textSecondary}">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-3 p-4 rounded-xl ${glassClass}">
                            <div class="user-avatar" style="width: 48px; height: 48px; font-size: 18px; border-radius: 12px;">${state.userName.charAt(0)}</div>
                            <div>
                                <p class="text-sm font-bold ${textPrimary}">${state.userName}</p>
                                <p class="text-xs ${textMuted}">${userData.email || ''}</p>
                                <div class="mt-1 inline-flex items-center gap-1 px-2 py-0.5 rounded-lg bg-indigo-500/10 text-indigo-500 text-xs font-bold">
                                    <i data-lucide="users" class="w-3 h-3"></i>
                                    Grupo ${state.userGroup}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6 space-y-3">
                        <!-- Hall of Fame liquid button (Mobile) -->

    <!-- Nebula shader background -->
    <script>
        function initNebulaShader() {
            const container = document.getElementById('nebula-bg');
            if (!container || !window.THREE) return;

            const THREE = window.THREE;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const scene  = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const clock  = new THREE.Clock();

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                precision mediump float;
                uniform vec2  iResolution;
                uniform float iTime;
                uniform vec2  iMouse;
                varying vec2  vUv;

                #define t iTime
                mat2 m(float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }

                float map(vec3 p){
                    p.xz *= m(t*0.4);
                    p.xy *= m(t*0.3);
                    vec3 q = p*2.0 + t;
                    return length(p + vec3(sin(t*0.7))) * log(length(p)+1.0)
                         + sin(q.x + sin(q.z + sin(q.y))) * 0.5 - 1.0;
                }

                void main(){
                    vec2 fragCoord = vUv * iResolution;
                    vec2 uv = fragCoord / min(iResolution.x, iResolution.y) - vec2(0.9, 0.5);
                    uv.x += 0.4;
                    vec3 col = vec3(0.0);
                    float d = 2.5;

                    for(int i = 0; i <= 5; i++){
                        vec3 p = vec3(0.0, 0.0, 5.0) + normalize(vec3(uv, -1.0)) * d;
                        float rz = map(p);
                        float f  = clamp((rz - map(p + 0.1)) * 0.5, -0.1, 1.0);
                        vec3 base = vec3(0.1, 0.3, 0.4) + vec3(5.0, 2.5, 3.0) * f;
                        col = col * base + smoothstep(2.5, 0.0, rz) * 0.7 * base;
                        d += min(rz, 1.0);
                    }

                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const uniforms = {
                iTime:       { value: 0 },
                iResolution: { value: new THREE.Vector2() },
                iMouse:      { value: new THREE.Vector2() },
            };

            const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
            const mesh     = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            const onResize = () => {
                const w = window.innerWidth, h = window.innerHeight;
                renderer.setSize(w, h);
                uniforms.iResolution.value.set(w, h);
            };
            const onMouse = (e) => {
                uniforms.iMouse.value.set(e.clientX, window.innerHeight - e.clientY);
            };

            window.addEventListener('resize',    onResize);
            window.addEventListener('mousemove', onMouse);
            onResize();

            renderer.setAnimationLoop(() => {
                uniforms.iTime.value = clock.getElapsedTime();
                renderer.render(scene, camera);
            });
        }

        (function () {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            s.onload = initNebulaShader;
            document.head.appendChild(s);
        })();
    </script>
